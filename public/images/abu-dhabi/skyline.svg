<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" fill="#0a1628"/>
  <defs>
    <linearGradient id="abuDhabiSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="50%" stop-color="#3b82b6"/>
      <stop offset="100%" stop-color="#87ceeb"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="url(#abuDhabiSky)"/>
  <!-- Etihad Towers -->
  <rect x="200" y="80" width="30" height="220" fill="#1a2d44" rx="2"/>
  <rect x="240" y="60" width="30" height="240" fill="#1a2d44" rx="2"/>
  <rect x="280" y="50" width="30" height="250" fill="#1a2d44" rx="2"/>
  <rect x="320" y="70" width="30" height="230" fill="#1a2d44" rx="2"/>
  <rect x="360" y="90" width="30" height="210" fill="#1a2d44" rx="2"/>
  <!-- Other buildings -->
  <rect x="440" y="130" width="35" height="170" fill="#1a2d44"/>
  <rect x="490" y="150" width="40" height="150" fill="#1a2d44"/>
  <rect x="550" y="110" width="30" height="190" fill="#1a2d44"/>
  <rect x="600" y="160" width="35" height="140" fill="#1a2d44"/>
  <rect x="80" y="170" width="25" height="130" fill="#1a2d44"/>
  <rect x="120" y="140" width="30" height="160" fill="#1a2d44"/>
  <!-- Water -->
  <rect x="0" y="300" width="800" height="100" fill="#1a3a5a"/>
  <rect x="100" y="310" width="600" height="2" fill="#87ceeb" opacity="0.2"/>
  <rect x="150" y="330" width="500" height="1" fill="#87ceeb" opacity="0.15"/>
  <!-- Label -->
  <text x="400" y="380" text-anchor="middle" fill="#87ceeb" font-family="system-ui" font-size="14" opacity="0.6">Abu Dhabi Skyline - UAE Capital</text>
</svg>