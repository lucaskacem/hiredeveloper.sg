<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#f0f4f8"/>
  <!-- Louvre Abu Dhabi dome -->
  <ellipse cx="200" cy="200" rx="160" ry="40" fill="#e2e8f0" stroke="#a0aec0" stroke-width="1"/>
  <!-- Dome lattice pattern -->
  <ellipse cx="200" cy="180" rx="150" ry="60" fill="none" stroke="#718096" stroke-width="2"/>
  <ellipse cx="200" cy="180" rx="120" ry="50" fill="none" stroke="#718096" stroke-width="1.5"/>
  <ellipse cx="200" cy="180" rx="90" ry="40" fill="none" stroke="#718096" stroke-width="1"/>
  <!-- Light spots -->
  <circle cx="150" cy="175" r="4" fill="#4a5568" opacity="0.3"/>
  <circle cx="200" cy="165" r="5" fill="#4a5568" opacity="0.3"/>
  <circle cx="250" cy="170" r="4" fill="#4a5568" opacity="0.3"/>
  <circle cx="170" cy="185" r="3" fill="#4a5568" opacity="0.3"/>
  <circle cx="230" cy="180" r="3" fill="#4a5568" opacity="0.3"/>
  <!-- Water -->
  <rect x="0" y="220" width="400" height="80" fill="#bfdbfe" opacity="0.5"/>
  <!-- Label -->
  <text x="200" y="270" text-anchor="middle" fill="#4a5568" font-family="system-ui" font-size="14" font-weight="bold">Louvre Abu Dhabi</text>
  <text x="200" y="288" text-anchor="middle" fill="#718096" font-family="system-ui" font-size="11">Saadiyat Island Cultural District</text>
</svg>