<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#f0f4f8"/>
  <!-- Sharjah landmarks -->
  <rect x="150" y="80" width="100" height="140" fill="#4a5568" rx="4"/>
  <!-- Al Noor Mosque dome -->
  <ellipse cx="200" cy="80" rx="50" ry="30" fill="#718096"/>
  <rect x="140" y="50" width="4" height="80" fill="#a0aec0"/>
  <rect x="256" y="50" width="4" height="80" fill="#a0aec0"/>
  <!-- Side buildings -->
  <rect x="60" y="120" width="50" height="100" fill="#a0aec0"/>
  <rect x="290" y="100" width="50" height="120" fill="#a0aec0"/>
  <!-- Ground -->
  <rect x="0" y="220" width="400" height="80" fill="#e2e8f0"/>
  <!-- Label -->
  <text x="200" y="255" text-anchor="middle" fill="#4a5568" font-family="system-ui" font-size="14" font-weight="bold">Sharjah</text>
  <text x="200" y="273" text-anchor="middle" fill="#718096" font-family="system-ui" font-size="11">Cultural Capital of the UAE</text>
</svg>