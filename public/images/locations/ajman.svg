<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#f0f4f8"/>
  <!-- Ajman coastline -->
  <rect x="0" y="180" width="400" height="40" fill="#bfdbfe" opacity="0.5"/>
  <!-- Buildings -->
  <rect x="100" y="100" width="35" height="80" fill="#4a5568"/>
  <rect x="150" y="80" width="30" height="100" fill="#718096"/>
