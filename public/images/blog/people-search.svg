<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="#f0f9ff"/>

  <!-- Magnifying glass -->
  <circle cx="180" cy="140" r="60" fill="#ffffff" stroke="#009fff" stroke-width="3"/>
  <line x1="222" y1="182" x2="270" y2="230" stroke="#009fff" stroke-width="8" stroke-linecap="round"/>
  <!-- Glass highlight -->
  <path d="M150 110 Q160 100 175 105" stroke="#009fff" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.3"/>

  <!-- Person inside magnifying glass -->
  <circle cx="180" cy="125" r="16" fill="#009fff"/>
  <path d="M158 160 Q180 175 202 160" stroke="#009fff" stroke-width="4" fill="none" stroke-linecap="round"/>
  <circle cx="180" cy="125" r="12" fill="#009fff" opacity="0.8"/>
  <!-- Face details -->
  <circle cx="176" cy="123" r="2" fill="#ffffff"/>
  <circle cx="184" cy="123" r="2" fill="#ffffff"/>
  <path d="M175 130 Q180 134 185 130" stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Small person cards floating around -->
  <!-- Card 1 -->
  <g transform="translate(300, 60)">
    <rect x="0" y="0" width="60" height="45" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
    <circle cx="20" cy="16" r="8" fill="#009fff" opacity="0.4"/>
    <rect x="34" y="12" width="18" height="3" rx="1.5" fill="#cbd5e1"/>
    <rect x="34" y="18" width="14" height="3" rx="1.5" fill="#e2e8f0"/>
    <rect x="8" y="32" width="44" height="3" rx="1.5" fill="#e2e8f0"/>
  </g>

  <!-- Card 2 -->
  <g transform="translate(310, 130)">
    <rect x="0" y="0" width="60" height="45" rx="6" fill="#ffffff" stroke="#009fff" stroke-width="1.5"/>
    <circle cx="20" cy="16" r="8" fill="#009fff" opacity="0.6"/>
    <rect x="34" y="12" width="18" height="3" rx="1.5" fill="#94a3b8"/>
    <rect x="34" y="18" width="14" height="3" rx="1.5" fill="#cbd5e1"/>
    <rect x="8" y="32" width="44" height="3" rx="1.5" fill="#cbd5e1"/>
  </g>

  <!-- Card 3 -->
  <g transform="translate(290, 205)">
    <rect x="0" y="0" width="60" height="45" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
    <circle cx="20" cy="16" r="8" fill="#009fff" opacity="0.4"/>
    <rect x="34" y="12" width="18" height="3" rx="1.5" fill="#cbd5e1"/>
    <rect x="34" y="18" width="14" height="3" rx="1.5" fill="#e2e8f0"/>
    <rect x="8" y="32" width="44" height="3" rx="1.5" fill="#e2e8f0"/>
  </g>

  <!-- Decorative dots -->
  <circle cx="50" cy="50" r="4" fill="#009fff" opacity="0.15"/>
  <circle cx="80" cy="250" r="5" fill="#009fff" opacity="0.15"/>
  <circle cx="350" cy="270" r="3" fill="#009fff" opacity="0.2"/>

  <!-- Search lines/waves -->
  <path d="M40 140 Q60 135 80 140 Q100 145 120 140" stroke="#009fff" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.2"/>
  <path d="M50 160 Q70 155 90 160 Q110 165 120 158" stroke="#009fff" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.15"/>
</svg>