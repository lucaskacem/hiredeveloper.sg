<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="#f0f9ff"/>

  <!-- Code editor window -->
  <rect x="50" y="35" width="300" height="200" rx="8" fill="#1e293b"/>
  <!-- Title bar -->
  <rect x="50" y="35" width="300" height="28" rx="8" fill="#334155"/>
  <rect x="50" y="55" width="300" height="8" fill="#334155"/>
  <!-- Traffic lights -->
  <circle cx="68" cy="49" r="5" fill="#ef4444"/>
  <circle cx="84" cy="49" r="5" fill="#eab308"/>
  <circle cx="100" cy="49" r="5" fill="#22c55e"/>

  <!-- Code lines -->
  <rect x="70" y="75" width="20" height="3" rx="1.5" fill="#009fff" opacity="0.6"/>
  <rect x="95" y="75" width="60" height="3" rx="1.5" fill="#94a3b8" opacity="0.5"/>
  <rect x="160" y="75" width="30" height="3" rx="1.5" fill="#22c55e" opacity="0.5"/>

  <rect x="85" y="88" width="40" height="3" rx="1.5" fill="#c084fc" opacity="0.5"/>
  <rect x="130" y="88" width="70" height="3" rx="1.5" fill="#94a3b8" opacity="0.4"/>

  <rect x="85" y="101" width="55" height="3" rx="1.5" fill="#009fff" opacity="0.5"/>
  <rect x="145" y="101" width="45" height="3" rx="1.5" fill="#fbbf24" opacity="0.5"/>

  <rect x="85" y="114" width="80" height="3" rx="1.5" fill="#94a3b8" opacity="0.4"/>

  <rect x="70" y="127" width="25" height="3" rx="1.5" fill="#009fff" opacity="0.6"/>
  <rect x="100" y="127" width="50" height="3" rx="1.5" fill="#94a3b8" opacity="0.5"/>

  <rect x="85" y="140" width="65" height="3" rx="1.5" fill="#22c55e" opacity="0.5"/>
  <rect x="155" y="140" width="35" height="3" rx="1.5" fill="#94a3b8" opacity="0.4"/>

  <rect x="70" y="153" width="30" height="3" rx="1.5" fill="#c084fc" opacity="0.5"/>

  <!-- Line numbers -->
  <text x="62" y="78" font-family="monospace" font-size="7" fill="#64748b" text-anchor="end">1</text>
  <text x="62" y="91" font-family="monospace" font-size="7" fill="#64748b" text-anchor="end">2</text>
  <text x="62" y="104" font-family="monospace" font-size="7" fill="#64748b" text-anchor="end">3</text>
  <text x="62" y="117" font-family="monospace" font-size="7" fill="#64748b" text-anchor="end">4</text>
  <text x="62" y="130" font-family="monospace" font-size="7" fill="#64748b" text-anchor="end">5</text>
  <text x="62" y="143" font-family="monospace" font-size="7" fill="#64748b" text-anchor="end">6</text>
  <text x="62" y="156" font-family="monospace" font-size="7" fill="#64748b" text-anchor="end">7</text>

  <!-- Comment bubble 1 -->
  <g transform="translate(280, 85)">
    <rect x="0" y="0" width="90" height="40" rx="6" fill="#009fff" opacity="0.9"/>
    <polygon points="-6,15 5,10 5,20" fill="#009fff" opacity="0.9"/>
    <rect x="10" y="10" width="50" height="3" rx="1.5" fill="#ffffff" opacity="0.8"/>
    <rect x="10" y="18" width="65" height="3" rx="1.5" fill="#ffffff" opacity="0.6"/>
    <rect x="10" y="26" width="40" height="3" rx="1.5" fill="#ffffff" opacity="0.6"/>
  </g>

  <!-- Comment bubble 2 -->
  <g transform="translate(275, 140)">
    <rect x="0" y="0" width="80" height="32" rx="6" fill="#22c55e" opacity="0.85"/>
    <polygon points="-6,12 5,8 5,16" fill="#22c55e" opacity="0.85"/>
    <rect x="10" y="9" width="55" height="3" rx="1.5" fill="#ffffff" opacity="0.8"/>
    <rect x="10" y="17" width="40" height="3" rx="1.5" fill="#ffffff" opacity="0.6"/>
  </g>

  <!-- Highlight line (review focus) -->
  <rect x="50" y="97" width="300" height="11" fill="#009fff" opacity="0.08"/>

  <!-- Bottom: review actions -->
  <g transform="translate(100, 250)">
    <!-- Approve button -->
    <rect x="0" y="0" width="80" height="30" rx="6" fill="#009fff"/>
    <circle cx="20" cy="15" r="6" fill="none" stroke="#ffffff" stroke-width="1.5"/>
    <path d="M17 15 L19 18 L24 12" stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="32" y="11" width="38" height="4" rx="2" fill="#ffffff" opacity="0.8"/>

    <!-- Comment button -->
    <rect x="100" y="0" width="80" height="30" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="116" y="7" width="12" height="10" rx="2" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
    <path d="M118 17 L115 21" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
    <rect x="136" y="11" width="34" height="4" rx="2" fill="#94a3b8"/>
  </g>
</svg>