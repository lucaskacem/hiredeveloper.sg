<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#f0f4f8"/>
  <!-- Marina Bay Sands -->
  <rect x="130" y="60" width="16" height="140" fill="#4a5568"/>
  <rect x="192" y="60" width="16" height="140" fill="#4a5568"/>
  <rect x="254" y="60" width="16" height="140" fill="#4a5568"/>
  <!-- SkyPark -->
  <rect x="115" y="48" width="170" height="14" rx="4" fill="#718096"/>
  <!-- Infinity pool suggestion -->
  <rect x="140" y="50" width="120" height="6" rx="2" fill="#60a5fa" opacity="0.4"/>
  <!-- ArtScience Museum -->
  <path d="M80 200 Q80 140 110 120 Q120 160 80 200z" fill="#a0aec0"/>
  <path d="M80 200 Q60 140 70 120 Q50 160 80 200z" fill="#a0aec0"/>
  <!-- Water -->
  <rect x="0" y="200" width="400" height="20" fill="#bfdbfe" opacity="0.5"/>
  <!-- Ground -->
  <rect x="0" y="220" width="400" height="80" fill="#e2e8f0"/>
  <!-- Label -->
  <text x="200" y="255" text-anchor="middle" fill="#4a5568" font-family="system-ui" font-size="14" font-weight="bold">Marina Bay</text>
  <text x="200" y="273" text-anchor="middle" fill="#718096" font-family="system-ui" font-size="11">Financial Centre &amp; Marina Bay Sands</text>
</svg>
