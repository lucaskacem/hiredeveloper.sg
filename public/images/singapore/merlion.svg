<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" fill="none">
  <rect width="400" height="600" fill="#f0f4f8"/>
  <defs>
    <linearGradient id="merlionBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a5568"/>
      <stop offset="100%" stop-color="#718096"/>
    </linearGradient>
  </defs>
  <!-- Merlion body -->
  <rect x="170" y="200" width="60" height="200" fill="url(#merlionBody)" rx="4"/>
  <!-- Merlion head (lion) -->
  <ellipse cx="200" cy="190" rx="45" ry="35" fill="url(#merlionBody)"/>
  <!-- Crown/mane -->
  <polygon points="170,175 185,140 200,160 215,140 230,175" fill="#4a5568"/>
  <!-- Fish tail -->
  <path d="M190,400 Q160,440 140,420 Q160,450 180,430 Q170,470 200,450" fill="#718096"/>
  <path d="M210,400 Q240,440 260,420 Q240,450 220,430 Q230,470 200,450" fill="#718096"/>
  <!-- Water spout -->
  <path d="M220,185 Q260,170 280,150 Q300,140 310,120" stroke="#60a5fa" stroke-width="6" fill="none" opacity="0.5" stroke-linecap="round"/>
  <!-- Base -->
  <rect x="140" y="420" width="120" height="20" rx="4" fill="#a0aec0"/>
  <!-- Ground -->
  <rect x="0" y="450" width="400" height="150" fill="#e2e8f0"/>
  <!-- Label -->
  <text x="200" y="500" text-anchor="middle" fill="#4a5568" font-family="system-ui" font-size="14" font-weight="bold">Merlion Park, Singapore</text>
  <text x="200" y="520" text-anchor="middle" fill="#718096" font-family="system-ui" font-size="11">Iconic Symbol of Singapore</text>
</svg>
