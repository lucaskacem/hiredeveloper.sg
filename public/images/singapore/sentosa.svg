<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#f0f4f8"/>
  <!-- Beach and palms -->
  <rect x="0" y="180" width="400" height="20" fill="#f5d89a" opacity="0.5"/>
  <!-- Palm trees -->
  <rect x="80" y="100" width="4" height="80" fill="#a0784a"/>
  <ellipse cx="82" cy="95" rx="25" ry="12" fill="#86efac" opacity="0.7"/>
  <rect x="300" y="110" width="4" height="70" fill="#a0784a"/>
  <ellipse cx="302" cy="105" rx="25" ry="12" fill="#86efac" opacity="0.7"/>
  <!-- Resort buildings -->
  <rect x="150" y="120" width="40" height="60" fill="#4a5568" rx="4"/>
  <rect x="200" y="100" width="50" height="80" fill="#718096" rx="4"/>
  <!-- Ocean -->
  <rect x="0" y="200" width="400" height="20" fill="#60a5fa" opacity="0.3"/>
  <!-- Ground -->
  <rect x="0" y="220" width="400" height="80" fill="#e2e8f0"/>
  <!-- Label -->
  <text x="200" y="255" text-anchor="middle" fill="#4a5568" font-family="system-ui" font-size="14" font-weight="bold">Sentosa</text>
  <text x="200" y="273" text-anchor="middle" fill="#718096" font-family="system-ui" font-size="11">Resort &amp; Entertainment Island</text>
</svg>
