  <rect x="80" y="100" width="60" height="120" fill="#4a5568" rx="4"/>
  <rect x="160" y="80" width="80" height="140" fill="#718096" rx="4"/>
  <rect x="260" y="110" width="60" height="110" fill="#4a5568" rx="4"/>
  <!-- Glass facade suggestion -->
  <rect x="165" y="85" width="70" height="5" fill="#60a5fa" opacity="0.3"/>
  <rect x="165" y="100" width="70" height="5" fill="#60a5fa" opacity="0.3"/>
  <rect x="165" y="115" width="70" height="5" fill="#60a5fa" opacity="0.3"/>
