<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#f0f4f8"/>
  <!-- Jurong Lake District buildings -->
  <rect x="100" y="90" width="40" height="130" fill="#4a5568" rx="2"/>
  <rect x="150" y="70" width="45" height="150" fill="#718096" rx="2"/>
  <rect x="205" y="100" width="50" height="120" fill="#4a5568" rx="2"/>
  <rect x="265" y="80" width="35" height="140" fill="#718096" rx="2"/>
  <!-- Lake -->
