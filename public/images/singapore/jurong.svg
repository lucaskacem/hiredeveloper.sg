  <!-- Ground -->
  <rect x="0" y="220" width="400" height="80" fill="#e2e8f0"/>
  <!-- Label -->
  <text x="200" y="255" text-anchor="middle" fill="#4a5568" font-family="system-ui" font-size="14" font-weight="bold">Jurong</text>
  <text x="200" y="273" text-anchor="middle" fill="#718096" font-family="system-ui" font-size="11">Jurong Lake District &amp; Innovation Hub</text>
