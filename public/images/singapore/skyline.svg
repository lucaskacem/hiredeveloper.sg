<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" fill="#0a1628"/>
  <!-- Gradient sky -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="40%" stop-color="#c44b2b"/>
      <stop offset="70%" stop-color="#e8a048"/>
      <stop offset="100%" stop-color="#f5d89a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="url(#sky)"/>
  <!-- Marina Bay Sands -->
  <rect x="280" y="100" width="20" height="180" fill="#0a1628"/>
  <rect x="340" y="100" width="20" height="180" fill="#0a1628"/>
  <rect x="400" y="100" width="20" height="180" fill="#0a1628"/>
  <!-- SkyPark on top -->
  <rect x="265" y="90" width="170" height="15" rx="3" fill="#0a1628"/>
  <!-- Buildings left -->
  <rect x="50" y="180" width="30" height="120" fill="#0a1628"/>
  <rect x="90" y="150" width="25" height="150" fill="#0a1628"/>
  <rect x="130" y="120" width="35" height="180" fill="#0a1628"/>
  <rect x="180" y="140" width="28" height="160" fill="#0a1628"/>
  <rect x="220" y="160" width="22" height="140" fill="#0a1628"/>
  <!-- Buildings right -->
  <rect x="460" y="140" width="40" height="160" fill="#0a1628"/>
  <rect x="510" y="110" width="35" height="190" fill="#0a1628"/>
  <rect x="560" y="160" width="28" height="140" fill="#0a1628"/>
  <rect x="600" y="130" width="32" height="170" fill="#0a1628"/>
  <rect x="650" y="170" width="25" height="130" fill="#0a1628"/>
  <rect x="700" y="150" width="30" height="150" fill="#0a1628"/>
  <!-- Singapore Flyer (simplified) -->
  <circle cx="730" cy="180" r="50" stroke="#0a1628" stroke-width="4" fill="none"/>
  <rect x="728" y="230" width="4" height="70" fill="#0a1628"/>
  <!-- Water reflection -->
  <rect x="0" y="300" width="800" height="100" fill="#0a1628" opacity="0.9"/>
  <rect x="100" y="310" width="600" height="2" fill="#e8a048" opacity="0.3"/>
  <rect x="150" y="330" width="500" height="1" fill="#e8a048" opacity="0.2"/>
  <rect x="200" y="350" width="400" height="1" fill="#e8a048" opacity="0.15"/>
  <!-- Text -->
  <text x="400" y="380" text-anchor="middle" fill="#f5d89a" font-family="system-ui" font-size="14" opacity="0.6">Singapore Skyline - Hire Developers in Singapore</text>
</svg>
