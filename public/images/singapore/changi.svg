<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#f0f4f8"/>
  <!-- Jewel Changi - donut/torus shape -->
  <ellipse cx="200" cy="150" rx="130" ry="80" fill="#a0aec0" opacity="0.3"/>
  <ellipse cx="200" cy="150" rx="130" ry="80" stroke="#718096" stroke-width="2" fill="none"/>
  <!-- Rain Vortex waterfall -->
  <rect x="196" y="90" width="8" height="100" fill="#60a5fa" opacity="0.4"/>
  <rect x="194" y="100" width="12" height="80" fill="#60a5fa" opacity="0.3"/>
  <!-- Indoor garden suggestion -->
  <circle cx="150" cy="160" r="8" fill="#86efac" opacity="0.5"/>
  <circle cx="180" cy="170" r="6" fill="#86efac" opacity="0.5"/>
  <circle cx="220" cy="170" r="6" fill="#86efac" opacity="0.5"/>
  <circle cx="250" cy="160" r="8" fill="#86efac" opacity="0.5"/>
  <!-- Ground -->
  <rect x="0" y="220" width="400" height="80" fill="#e2e8f0"/>
  <!-- Label -->
  <text x="200" y="255" text-anchor="middle" fill="#4a5568" font-family="system-ui" font-size="14" font-weight="bold">Changi Business Park</text>
  <text x="200" y="273" text-anchor="middle" fill="#718096" font-family="system-ui" font-size="11">Jewel Changi &amp; Tech Corridor</text>
</svg>
