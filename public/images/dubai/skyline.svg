<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" fill="#0a1628"/>
  <!-- Gradient sky -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="40%" stop-color="#c44b2b"/>
      <stop offset="70%" stop-color="#e8a048"/>
      <stop offset="100%" stop-color="#f5d89a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="url(#sky)"/>
  <!-- Buildings silhouette -->
  <rect x="50" y="180" width="30" height="120" fill="#0a1628"/>
  <rect x="90" y="150" width="25" height="150" fill="#0a1628"/>
  <rect x="130" y="120" width="35" height="180" fill="#0a1628"/>
  <rect x="180" y="100" width="28" height="200" fill="#0a1628"/>
  <rect x="220" y="160" width="22" height="140" fill="#0a1628"/>
  <rect x="260" y="130" width="30" height="170" fill="#0a1628"/>
  <!-- Burj Khalifa -->
  <rect x="350" y="30" width="12" height="270" fill="#0a1628"/>
  <polygon points="350,30 356,10 362,30" fill="#0a1628"/>
  <rect x="340" y="80" width="32" height="220" fill="#0a1628"/>
  <rect x="335" y="150" width="42" height="150" fill="#0a1628"/>
  <!-- More buildings -->
  <rect x="420" y="140" width="40" height="160" fill="#0a1628"/>
  <rect x="470" y="110" width="35" height="190" fill="#0a1628"/>
  <rect x="520" y="160" width="28" height="140" fill="#0a1628"/>
  <rect x="560" y="130" width="32" height="170" fill="#0a1628"/>
  <rect x="610" y="170" width="25" height="130" fill="#0a1628"/>
  <rect x="650" y="150" width="30" height="150" fill="#0a1628"/>
  <rect x="700" y="180" width="35" height="120" fill="#0a1628"/>
  <rect x="745" y="160" width="25" height="140" fill="#0a1628"/>
  <!-- Water reflection -->
  <rect x="0" y="300" width="800" height="100" fill="#0a1628" opacity="0.9"/>
  <rect x="100" y="310" width="600" height="2" fill="#e8a048" opacity="0.3"/>
  <rect x="150" y="330" width="500" height="1" fill="#e8a048" opacity="0.2"/>
  <rect x="200" y="350" width="400" height="1" fill="#e8a048" opacity="0.15"/>
  <!-- Text -->
  <text x="400" y="380" text-anchor="middle" fill="#f5d89a" font-family="system-ui" font-size="14" opacity="0.6">Dubai Skyline - Hire Developers in Dubai</text>
</svg>