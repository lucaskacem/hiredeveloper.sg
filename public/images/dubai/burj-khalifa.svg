<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" fill="none">
  <rect width="400" height="600" fill="#f0f4f8"/>
  <defs>
    <linearGradient id="tower" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a5568"/>
      <stop offset="100%" stop-color="#718096"/>
    </linearGradient>
  </defs>
  <!-- Burj Khalifa -->
  <polygon points="200,20 195,40 205,40" fill="url(#tower)"/>
  <rect x="196" y="40" width="8" height="60" fill="url(#tower)"/>
  <rect x="190" y="100" width="20" height="80" fill="url(#tower)"/>
  <rect x="184" y="180" width="32" height="80" fill="url(#tower)"/>
  <rect x="178" y="260" width="44" height="80" fill="url(#tower)"/>
  <rect x="172" y="340" width="56" height="60" fill="url(#tower)"/>
  <rect x="166" y="400" width="68" height="50" fill="url(#tower)"/>
  <rect x="160" y="450" width="80" height="40" fill="url(#tower)"/>
  <!-- Base -->
  <rect x="100" y="490" width="200" height="20" rx="4" fill="#a0aec0"/>
  <!-- Ground -->
  <rect x="0" y="510" width="400" height="90" fill="#e2e8f0"/>
  <!-- Label -->
  <text x="200" y="560" text-anchor="middle" fill="#4a5568" font-family="system-ui" font-size="14" font-weight="bold">Burj Khalifa, Downtown Dubai</text>
  <text x="200" y="580" text-anchor="middle" fill="#718096" font-family="system-ui" font-size="11">828m - World's Tallest Building</text>
</svg>