<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" fill="#f0f4f8"/>
  <!-- DIFC Gate Building -->
  <rect x="120" y="100" width="160" height="200" fill="#4a5568" rx="4"/>
  <!-- Gate archway -->
  <rect x="160" y="180" width="80" height="120" fill="#f0f4f8" rx="40 40 0 0"/>
  <!-- Decorative pattern -->
  <rect x="130" y="110" width="140" height="10" fill="#718096"/>
  <rect x="130" y="130" width="140" height="10" fill="#718096"/>
  <rect x="130" y="150" width="140" height="10" fill="#718096"/>
  <!-- Side buildings -->
  <rect x="60" y="160" width="50" height="140" fill="#a0aec0"/>
  <rect x="290" y="140" width="50" height="160" fill="#a0aec0"/>
  <!-- Ground -->
  <rect x="0" y="300" width="400" height="100" fill="#e2e8f0"/>
  <!-- Label -->
  <text x="200" y="340" text-anchor="middle" fill="#4a5568" font-family="system-ui" font-size="14" font-weight="bold">DIFC Gate, Dubai</text>
  <text x="200" y="360" text-anchor="middle" fill="#718096" font-family="system-ui" font-size="11">Dubai International Financial Centre</text>
</svg>