<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" fill="#f0f4f8"/>
  <!-- Museum of the Future - torus shape -->
  <ellipse cx="200" cy="200" rx="130" ry="100" stroke="#4a5568" stroke-width="30" fill="none"/>
  <!-- Inner cutout effect -->
  <ellipse cx="200" cy="200" rx="90" ry="65" fill="#f0f4f8"/>
  <!-- Arabic calligraphy suggestion (decorative lines) -->
  <path d="M120 180 Q160 170 200 175 Q240 180 280 170" stroke="#718096" stroke-width="2" fill="none"/>
  <path d="M130 200 Q170 195 200 200 Q230 205 270 195" stroke="#718096" stroke-width="2" fill="none"/>
  <path d="M140 220 Q180 215 200 220 Q220 225 260 215" stroke="#718096" stroke-width="2" fill="none"/>
  <!-- Ground -->
  <rect x="0" y="320" width="400" height="80" fill="#e2e8f0"/>
  <!-- Label -->
  <text x="200" y="360" text-anchor="middle" fill="#4a5568" font-family="system-ui" font-size="14" font-weight="bold">Museum of the Future, Dubai</text>
  <text x="200" y="380" text-anchor="middle" fill="#718096" font-family="system-ui" font-size="11">Innovation &amp; Technology Hub</text>
</svg>