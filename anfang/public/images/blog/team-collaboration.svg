<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="#f0f9ff"/>

  <!-- Connection lines (behind nodes) -->
  <line x1="200" y1="80" x2="100" y2="150" stroke="#009fff" stroke-width="2" opacity="0.25"/>
  <line x1="200" y1="80" x2="300" y2="150" stroke="#009fff" stroke-width="2" opacity="0.25"/>
  <line x1="100" y1="150" x2="140" y2="240" stroke="#009fff" stroke-width="2" opacity="0.25"/>
  <line x1="300" y1="150" x2="260" y2="240" stroke="#009fff" stroke-width="2" opacity="0.25"/>
  <line x1="100" y1="150" x2="260" y2="240" stroke="#009fff" stroke-width="1.5" opacity="0.12"/>
  <line x1="300" y1="150" x2="140" y2="240" stroke="#009fff" stroke-width="1.5" opacity="0.12"/>
  <line x1="140" y1="240" x2="260" y2="240" stroke="#009fff" stroke-width="2" opacity="0.25"/>
  <line x1="200" y1="80" x2="140" y2="240" stroke="#009fff" stroke-width="1.5" opacity="0.12"/>
  <line x1="200" y1="80" x2="260" y2="240" stroke="#009fff" stroke-width="1.5" opacity="0.12"/>

  <!-- Node 1 - top center -->
  <circle cx="200" cy="80" r="28" fill="#ffffff" stroke="#009fff" stroke-width="2.5"/>
  <circle cx="200" cy="72" r="10" fill="#009fff"/>
  <path d="M186 94 Q200 102 214 94" stroke="#009fff" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Node 2 - left -->
  <circle cx="100" cy="150" r="28" fill="#ffffff" stroke="#009fff" stroke-width="2.5"/>
  <circle cx="100" cy="142" r="10" fill="#009fff" opacity="0.8"/>
  <path d="M86 164 Q100 172 114 164" stroke="#009fff" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8"/>

  <!-- Node 3 - right -->
  <circle cx="300" cy="150" r="28" fill="#ffffff" stroke="#009fff" stroke-width="2.5"/>
  <circle cx="300" cy="142" r="10" fill="#009fff" opacity="0.8"/>
  <path d="M286 164 Q300 172 314 164" stroke="#009fff" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8"/>

  <!-- Node 4 - bottom left -->
  <circle cx="140" cy="240" r="28" fill="#ffffff" stroke="#009fff" stroke-width="2.5"/>
  <circle cx="140" cy="232" r="10" fill="#009fff" opacity="0.7"/>
  <path d="M126 254 Q140 262 154 254" stroke="#009fff" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Node 5 - bottom right -->
  <circle cx="260" cy="240" r="28" fill="#ffffff" stroke="#009fff" stroke-width="2.5"/>
  <circle cx="260" cy="232" r="10" fill="#009fff" opacity="0.7"/>
  <path d="M246 254 Q260 262 274 254" stroke="#009fff" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Data flow pulses on connections -->
  <circle cx="150" cy="115" r="4" fill="#009fff" opacity="0.5"/>
  <circle cx="250" cy="115" r="4" fill="#009fff" opacity="0.5"/>
  <circle cx="200" cy="240" r="4" fill="#009fff" opacity="0.4"/>
  <circle cx="120" cy="195" r="3" fill="#009fff" opacity="0.4"/>
  <circle cx="280" cy="195" r="3" fill="#009fff" opacity="0.4"/>

  <!-- Small decorative elements -->
  <circle cx="40" cy="60" r="3" fill="#009fff" opacity="0.15"/>
  <circle cx="360" cy="60" r="4" fill="#009fff" opacity="0.15"/>
  <circle cx="40" cy="260" r="4" fill="#009fff" opacity="0.15"/>
  <circle cx="360" cy="260" r="3" fill="#009fff" opacity="0.15"/>
  <circle cx="200" cy="160" r="5" fill="#009fff" opacity="0.1"/>
</svg>