<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="#f0f9ff"/>

  <!-- Clipboard body -->
  <rect x="120" y="40" width="160" height="220" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <!-- Clipboard clip -->
  <rect x="170" y="30" width="60" height="20" rx="4" fill="#009fff"/>
  <circle cx="200" cy="40" r="5" fill="#ffffff"/>

  <!-- Header line -->
  <rect x="145" y="70" width="110" height="6" rx="3" fill="#009fff" opacity="0.3"/>

  <!-- Checklist item 1 - checked -->
  <rect x="142" y="95" width="20" height="20" rx="4" fill="#009fff"/>
  <path d="M148 105 L152 110 L158 100" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="172" y="100" width="90" height="5" rx="2.5" fill="#94a3b8"/>
  <rect x="172" y="110" width="60" height="4" rx="2" fill="#cbd5e1"/>

  <!-- Checklist item 2 - checked -->
  <rect x="142" y="130" width="20" height="20" rx="4" fill="#009fff"/>
  <path d="M148 140 L152 145 L158 135" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="172" y="135" width="80" height="5" rx="2.5" fill="#94a3b8"/>
  <rect x="172" y="145" width="70" height="4" rx="2" fill="#cbd5e1"/>

  <!-- Checklist item 3 - checked -->
  <rect x="142" y="165" width="20" height="20" rx="4" fill="#009fff"/>
  <path d="M148 175 L152 180 L158 170" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="172" y="170" width="95" height="5" rx="2.5" fill="#94a3b8"/>
  <rect x="172" y="180" width="55" height="4" rx="2" fill="#cbd5e1"/>

  <!-- Checklist item 4 - unchecked -->
  <rect x="142" y="200" width="20" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="172" y="205" width="85" height="5" rx="2.5" fill="#cbd5e1"/>
  <rect x="172" y="215" width="65" height="4" rx="2" fill="#e2e8f0"/>

  <!-- Checklist item 5 - unchecked -->
  <rect x="142" y="232" width="16" height="16" rx="3" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="168" y="235" width="75" height="4" rx="2" fill="#e2e8f0"/>

  <!-- Pencil decoration -->
  <g transform="translate(300, 100) rotate(30)">
    <rect x="0" y="0" width="8" height="60" rx="1" fill="#009fff"/>
    <polygon points="0,60 8,60 4,72" fill="#009fff" opacity="0.7"/>
    <rect x="0" y="0" width="8" height="8" rx="1" fill="#e2e8f0"/>
  </g>

  <!-- Star/sparkle decorations -->
  <circle cx="90" cy="80" r="4" fill="#009fff" opacity="0.3"/>
  <circle cx="85" cy="180" r="3" fill="#009fff" opacity="0.2"/>
  <circle cx="330" cy="200" r="5" fill="#009fff" opacity="0.2"/>
  <circle cx="310" cy="70" r="3" fill="#009fff" opacity="0.3"/>

  <!-- Progress arc -->
  <path d="M340 260 A30 30 0 1 1 310 230" stroke="#009fff" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.3"/>
  <text x="320" y="252" font-family="system-ui, sans-serif" font-size="12" fill="#009fff" text-anchor="middle" font-weight="bold" opacity="0.5">75%</text>
</svg>