<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="#f0f9ff"/>

  <!-- Dashboard panel -->
  <rect x="40" y="30" width="320" height="210" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Top bar -->
  <rect x="40" y="30" width="320" height="35" rx="10" fill="#f8fafc"/>
  <rect x="40" y="55" width="320" height="10" fill="#f8fafc"/>
  <circle cx="60" cy="48" r="4" fill="#009fff" opacity="0.5"/>
  <rect x="72" y="44" width="50" height="4" rx="2" fill="#94a3b8"/>
  <rect x="72" y="52" width="35" height="3" rx="1.5" fill="#cbd5e1"/>

  <!-- Bar chart -->
  <g transform="translate(60, 80)">
    <rect x="0" y="70" width="24" height="60" rx="3" fill="#009fff" opacity="0.3"/>
    <rect x="32" y="50" width="24" height="80" rx="3" fill="#009fff" opacity="0.5"/>
    <rect x="64" y="30" width="24" height="100" rx="3" fill="#009fff" opacity="0.7"/>
    <rect x="96" y="10" width="24" height="120" rx="3" fill="#009fff"/>
    <!-- Axis -->
    <line x1="0" y1="130" x2="120" y2="130" stroke="#e2e8f0" stroke-width="1"/>
  </g>

  <!-- Circular progress / donut chart -->
  <g transform="translate(280, 140)">
    <circle cx="0" cy="0" r="35" fill="none" stroke="#e2e8f0" stroke-width="8"/>
    <circle cx="0" cy="0" r="35" fill="none" stroke="#009fff" stroke-width="8" stroke-dasharray="198 220" stroke-linecap="round" transform="rotate(-90)"/>
    <text x="0" y="4" font-family="system-ui, sans-serif" font-size="14" fill="#009fff" text-anchor="middle" font-weight="bold">90%</text>
  </g>

  <!-- Line chart area -->
  <g transform="translate(60, 170)">
    <rect x="0" y="0" width="150" height="55" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <polyline points="10,40 35,25 60,30 85,15 110,20 135,8" stroke="#009fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="10,40 35,25 60,30 85,15 110,20 135,8 135,45 10,45" fill="#009fff" opacity="0.08"/>
    <!-- Dots on line -->
    <circle cx="35" cy="25" r="2.5" fill="#009fff"/>
    <circle cx="85" cy="15" r="2.5" fill="#009fff"/>
    <circle cx="135" cy="8" r="2.5" fill="#009fff"/>
  </g>

  <!-- Status indicators at top right of panel -->
  <g transform="translate(280, 78)">
    <rect x="0" y="0" width="60" height="16" rx="8" fill="#009fff" opacity="0.1"/>
    <circle cx="12" cy="8" r="3" fill="#22c55e"/>
    <rect x="20" y="5" width="32" height="3" rx="1.5" fill="#009fff" opacity="0.5"/>
  </g>

  <!-- Completion checkmark badge -->
  <g transform="translate(320, 250)">
    <circle cx="0" cy="0" r="22" fill="#009fff"/>
    <circle cx="0" cy="0" r="18" fill="#ffffff"/>
    <path d="M-8 0 L-3 6 L9 -6" stroke="#009fff" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Confetti-like decorative elements -->
  <rect x="55" y="260" width="8" height="3" rx="1.5" fill="#009fff" opacity="0.3" transform="rotate(-15 59 261)"/>
  <rect x="100" y="255" width="8" height="3" rx="1.5" fill="#009fff" opacity="0.2" transform="rotate(20 104 256)"/>
  <rect x="150" y="265" width="8" height="3" rx="1.5" fill="#009fff" opacity="0.25" transform="rotate(-30 154 266)"/>
  <rect x="200" y="258" width="8" height="3" rx="1.5" fill="#009fff" opacity="0.3" transform="rotate(10 204 259)"/>
  <rect x="250" y="262" width="8" height="3" rx="1.5" fill="#009fff" opacity="0.2" transform="rotate(-20 254 263)"/>

  <circle cx="70" cy="252" r="3" fill="#009fff" opacity="0.2"/>
  <circle cx="180" cy="260" r="2" fill="#009fff" opacity="0.3"/>
  <circle cx="270" cy="255" r="3" fill="#009fff" opacity="0.15"/>
</svg>